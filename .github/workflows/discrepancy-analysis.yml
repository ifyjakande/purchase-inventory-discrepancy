name: Purchase Inventory Discrepancy Analysis

on:
  schedule:
    # Run every 5 minutes for smart detection
    - cron: '2-59/5 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  check-changes:
    # Only scheduled runs use the state file for change detection.
    # Manual/terminal runs (workflow_dispatch) skip this and always analyze.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Checkout state branch
      uses: actions/checkout@v4
      with:
        ref: state
        path: state

    - name: Restore hash file from state branch
      run: cp state/last_source_hash.json last_source_hash.json

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies for change detection
      run: |
        python -m pip install --upgrade pip
        pip install google-auth google-api-python-client gspread

    - name: Check for changes
      id: check
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        PURCHASE_SHEET_ID: ${{ secrets.PURCHASE_SHEET_ID }}
        INVENTORY_SHEET_ID: ${{ secrets.INVENTORY_SHEET_ID }}
        ENTRY_SHEET_NAME: ${{ secrets.ENTRY_SHEET_NAME }}
        INVENTORY_SHEET_NAME: ${{ secrets.INVENTORY_SHEET_NAME }}
        CI: "true"
      run: |
        python check_changes.py > check_output.txt 2>&1
        if grep -q "NEEDS_UPDATE=true" check_output.txt; then
          echo "needs_update=true" >> $GITHUB_OUTPUT
        else
          echo "needs_update=false" >> $GITHUB_OUTPUT
        fi
        cat check_output.txt

    - name: Commit hash tracking file to state branch
      if: steps.check.outputs.needs_update == 'true'
      run: |
        cp last_source_hash.json state/last_source_hash.json
        cd state
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add last_source_hash.json
        git diff --staged --quiet || git commit -m "Update last processed hash"
        git push

  analyze-discrepancies:
    needs: check-changes
    # Run on manual dispatch always; on schedule only when source data changed.
    if: >-
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          needs.check-changes.result == 'success' &&
          needs.check-changes.outputs.needs_update == 'true'
        )
      )
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Sync consolidated entry log into the two source tabs
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        PURCHASE_SHEET_ID: ${{ secrets.PURCHASE_SHEET_ID }}
        SECONDARY_SHEET_ID: ${{ secrets.SECONDARY_SHEET_ID }}
        ENTRY_SHEET_NAME: ${{ secrets.ENTRY_SHEET_NAME }}
        PURCHASE_SHEET_NAME: ${{ secrets.PURCHASE_SHEET_NAME }}
        SECONDARY_SHEET_NAME: ${{ secrets.SECONDARY_SHEET_NAME }}
      run: |
        python sync_entry_log.py

    - name: Run discrepancy analysis
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        PURCHASE_SHEET_ID: ${{ secrets.PURCHASE_SHEET_ID }}
        INVENTORY_SHEET_ID: ${{ secrets.INVENTORY_SHEET_ID }}
        PURCHASE_SHEET_NAME: ${{ secrets.PURCHASE_SHEET_NAME }}
        INVENTORY_SHEET_NAME: ${{ secrets.INVENTORY_SHEET_NAME }}
        PURCHASE_TARGETS_2026: ${{ secrets.PURCHASE_TARGETS_2026 }}
      run: |
        python discrepancy_analyzer.py